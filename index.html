<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Terminal — Senior Frontend Practice</title>
<meta name="description" content="Flashcard-style practice for senior frontend interviews: JS/React fundamentals + LeetCode-style algorithms.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..500;12..96,700..800&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="grain"></div>

<div class="app-shell">

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">&gt;_</span>
      <div class="brand-text">
        <h1>Interview<span class="brand-accent">Terminal</span><span class="cursor-blink">&#9608;</span></h1>
        <p class="brand-sub">Senior Frontend Practice &middot; React / JS / TS / Algorithms</p>
      </div>
    </div>
    <div class="header-stats">
      <button class="ghost-btn" id="progressToggle" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 3v18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 15l4-5 3 3 5-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Progress
      </button>
      <div class="ring-stat" id="overallRing" title="Overall progress">
        <svg viewBox="0 0 44 44" class="ring-svg">
          <circle cx="22" cy="22" r="19" class="ring-track"/>
          <circle cx="22" cy="22" r="19" class="ring-fill" id="ringFill"/>
        </svg>
        <span class="ring-label" id="ringLabel">0%</span>
      </div>
    </div>
  </header>

  <nav class="guide-tabs" id="guideTabs">
    <button class="tab active" data-guide="all">All Guides<span class="tab-count" id="cnt-all"></span></button>
    <button class="tab" data-guide="Interview Guide">Interview Prep<span class="tab-count" id="cnt-interview"></span></button>
    <button class="tab" data-guide="Algorithms Guide">Algorithms<span class="tab-count" id="cnt-algo"></span></button>
  </nav>

  <div class="control-bar">
    <div class="control-group">
      <label class="control-label" for="topicSelect">$ topic</label>
      <select id="topicSelect" class="terminal-select"></select>
    </div>

    <div class="control-group">
      <label class="control-label" for="patternSelect">$ pattern</label>
      <select id="patternSelect" class="terminal-select"></select>
    </div>

    <div class="control-group level-group">
      <label class="control-label">$ difficulty</label>
      <div class="level-chips" id="levelChips">
        <button class="chip lvl-all active" data-level="all">All</button>
        <button class="chip lvl-easy" data-level="Easy">Easy</button>
        <button class="chip lvl-medium" data-level="Medium">Medium</button>
        <button class="chip lvl-hard" data-level="Hard">Hard</button>
      </div>
    </div>

    <div class="control-group search-group">
      <label class="control-label" for="searchInput">$ grep</label>
      <input id="searchInput" class="terminal-input" type="text" placeholder="search questions, topics, companies..." autocomplete="off">
    </div>

    <div class="control-group toggle-group">
      <button class="toggle-btn" id="hideDoneBtn" aria-pressed="false">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        Hide reviewed
      </button>
      <button class="toggle-btn" id="shuffleBtn" aria-pressed="false">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        Shuffle
      </button>
      <button class="ghost-btn small" id="resetFiltersBtn">Reset</button>
    </div>
  </div>

  <div class="main-layout">

    <aside class="progress-panel" id="progressPanel">
      <div class="panel-inner">
        <h2>Coverage Map</h2>
        <p class="panel-sub">Click a topic to jump straight to it.</p>
        <div id="progressList" class="progress-list"></div>
      </div>
    </aside>

    <main class="card-stage">
      <div class="flashcard" id="flashcard">
        <!-- populated by app.js -->
      </div>

      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" aria-label="Previous question">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Prev
        </button>

        <button class="review-btn" id="reviewBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="reviewBtnLabel">Mark as reviewed</span>
        </button>

        <button class="nav-btn" id="nextBtn" aria-label="Next question">
          Next
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <p class="kbd-hint">
        <kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate &nbsp;&middot;&nbsp; <kbd>H</kbd> how to solve &nbsp;&middot;&nbsp; <kbd>R</kbd> dry run &nbsp;&middot;&nbsp; <kbd>P</kbd> pitfalls &nbsp;&middot;&nbsp; <kbd>E</kbd> explain &nbsp;&middot;&nbsp; <kbd>A</kbd> answer &nbsp;&middot;&nbsp; <kbd>D</kbd> done &nbsp;&middot;&nbsp; <kbd>/</kbd> search
      </p>
    </main>

  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
